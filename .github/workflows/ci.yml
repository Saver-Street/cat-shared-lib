name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.6.2

  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test (race + coverage)
        run: go test ./... -count=1 -race -coverprofile=coverage.out
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -20
      - name: Enforce 95% coverage threshold
        run: make check-coverage
      - name: Generate per-package coverage report
        if: always()
        run: |
          echo "## 📊 Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Coverage |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|----------|" >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | grep -E '^github\.com' | grep 'total:' | while read -r line; do
            pkg=$(echo "$line" | awk '{print $1}')
            cov=$(echo "$line" | awk '{print $NF}')
            echo "| **Total** | **${cov}** |" >> "$GITHUB_STEP_SUMMARY"
          done
          go tool cover -func=coverage.out | \
            grep -v 'total:' | \
            awk '{print $1}' | \
            sed 's|github.com/Saver-Street/cat-shared-lib/||' | \
            cut -d/ -f1 | \
            sort -u | while read -r pkg; do
              cov=$(go tool cover -func=coverage.out | grep "github.com/Saver-Street/cat-shared-lib/${pkg}/" | tail -1 | awk '{print $NF}' || echo "N/A")
              # Compute package-level total from all functions in the package.
              total=$(go tool cover -func=coverage.out | grep "github.com/Saver-Street/cat-shared-lib/${pkg}/" | awk '{sum+=$NF; n++} END {if(n>0) printf "%.1f%%", sum/n; else print "N/A"}')
              echo "| ${pkg} | ${total} |" >> "$GITHUB_STEP_SUMMARY"
            done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Threshold: 95% per package_" >> "$GITHUB_STEP_SUMMARY"
      - name: Generate HTML coverage report
        if: always()
        run: go tool cover -html=coverage.out -o coverage.html
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html
          retention-days: 14
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = require('child_process').execSync(
              'go tool cover -func=coverage.out | tail -1',
              {encoding: 'utf8'}
            ).trim();
            const match = output.match(/([\d.]+)%/);
            const total = match ? match[1] : 'unknown';

            const body = `## 📊 Coverage Report

            **Total coverage: ${total}%**

            <details>
            <summary>Per-package breakdown</summary>

            \`\`\`
            ${require('child_process').execSync('go tool cover -func=coverage.out | tail -40', {encoding: 'utf8'})}
            \`\`\`

            </details>

            _Threshold: 95% per package · [Download full report](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`;

            // Find existing coverage comment.
            const {data: comments} = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('📊 Coverage Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: go build
        run: go build ./...
